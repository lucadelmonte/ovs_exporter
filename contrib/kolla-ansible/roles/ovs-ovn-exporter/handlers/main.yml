---
- name: Restart ovs-exporter
  become: yes
  systemd:
    name: "{{ ovs_exporter_service_name }}"
    state: restarted
    daemon_reload: yes

- name: Restart ovn-exporter
  become: yes
  systemd:
    name: "{{ ovn_exporter_service_name }}"
    state: restarted
    daemon_reload: yes

- name: Reload systemd
  become: yes
  systemd:
    daemon_reload: yes
